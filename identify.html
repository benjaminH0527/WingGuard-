<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AI 识鸟 · WingGuard Vision</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Manrope:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&family=Noto+Serif+SC:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- 高德地图安全密钥 -->
    <script type="text/javascript">
        window._AMapSecurityConfig = { securityJsCode: 'e8ce414700ebe2938012b0a35e7d9250' };
    </script>
    <script type="text/javascript" src="https://webapi.amap.com/maps?v=2.0&key=cb8a3d9cbeb942ce5337ceee3ae4630d&plugin=AMap.Geolocation"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
    :root{
        --gold:#F0C674; --gold-2:#E3A34D;
        --cyan:#7FE9D6; --cyan-2:#57c9b6;
        --hud: rgba(12,16,18,0.66);
        --hud-2: rgba(16,22,24,0.82);
        --line: rgba(255,255,255,0.12);
        --line-2: rgba(255,255,255,0.07);
        --txt:#EAF1EE; --txt-dim: rgba(234,241,238,0.6);
        --ease: cubic-bezier(0.16,1,0.3,1);
    }
    *{ margin:0; padding:0; box-sizing:border-box; }
    html,body{ width:100%; height:100%; overflow:hidden; background:#0A0E10; }
    body{ font-family:'Manrope','PingFang SC',sans-serif; color:var(--txt); -webkit-font-smoothing:antialiased; }
    .serif{ font-family:'Fraunces','Noto Serif SC',serif; }
    .mono{ font-family:'IBM Plex Mono',monospace; }
    ::selection{ background:var(--gold); color:#0A0E10; }

    /* ---- base layers ---- */
    #map{ position:absolute; inset:0; z-index:0; }
    /* darken + edge-seat the map so the HUD reads */
    #scrim{ position:absolute; inset:0; z-index:1; pointer-events:none;
        background:
          radial-gradient(120% 80% at 50% 0%, rgba(6,10,12,0.72), transparent 42%),
          radial-gradient(120% 90% at 50% 100%, rgba(6,10,12,0.85), transparent 46%),
          radial-gradient(80% 60% at 50% 50%, transparent 60%, rgba(6,10,12,0.4)); }
    #particles{ position:absolute; inset:0; z-index:2; pointer-events:none; }

    /* ---- glass ---- */
    .glass{
        background:linear-gradient(150deg, var(--hud-2), var(--hud));
        backdrop-filter:blur(22px) saturate(140%);
        -webkit-backdrop-filter:blur(22px) saturate(140%);
        border:1px solid var(--line);
        box-shadow:0 1px 0 rgba(255,255,255,0.06) inset, 0 30px 60px -30px rgba(0,0,0,0.8);
    }

    /* ================= TOP HUD ================= */
    .hud{ position:absolute; top:0; left:0; right:0; z-index:20;
        display:flex; align-items:center; justify-content:space-between; gap:14px;
        padding:calc(14px + env(safe-area-inset-top,0)) 22px 14px;
        background:linear-gradient(180deg, rgba(8,11,13,0.82), rgba(8,11,13,0) );
        backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
    }
    .brand{ display:flex; align-items:center; gap:12px; text-decoration:none; color:var(--txt); }
    .brand img{ width:30px; height:30px; object-fit:contain; filter:drop-shadow(0 0 8px rgba(240,198,116,0.5)); }
    .brand .t{ line-height:1; }
    .brand .t b{ font-size:15px; font-weight:600; letter-spacing:.5px; }
    .brand .t small{ display:block; font-size:9px; letter-spacing:.28em; color:var(--gold); margin-top:3px; text-transform:uppercase; }
    .hud-right{ display:flex; align-items:center; gap:10px; }
    .chip{ display:inline-flex; align-items:center; gap:8px; height:38px; padding:0 14px; border-radius:999px;
        font-size:12px; color:var(--txt-dim); }
    .chip i{ color:var(--cyan); }
    .status-dot{ width:7px; height:7px; border-radius:50%; background:var(--cyan); box-shadow:0 0 0 0 rgba(127,233,214,.6); animation:pulse 2s infinite; }
    @keyframes pulse{ 0%{ box-shadow:0 0 0 0 rgba(127,233,214,.5);} 70%{ box-shadow:0 0 0 8px rgba(127,233,214,0);} 100%{ box-shadow:0 0 0 0 rgba(127,233,214,0);} }
    .user-pill{ display:inline-flex; align-items:center; gap:9px; height:38px; padding:0 6px 0 14px; border-radius:999px; cursor:pointer;
        font-size:12px; color:var(--txt); transition:border-color .3s; }
    .user-pill:hover{ border-color:var(--gold); }
    .user-pill .av{ width:26px; height:26px; border-radius:50%; display:flex; align-items:center; justify-content:center;
        background:radial-gradient(circle at 35% 30%, var(--gold), var(--gold-2)); color:#0A0E10; font-size:11px; }
    .user-pill .pts{ color:var(--gold); font-weight:600; }
    .login-btn{ height:38px; padding:0 18px; border-radius:999px; border:1px solid var(--gold);
        background:linear-gradient(180deg, rgba(240,198,116,0.16), rgba(240,198,116,0.06)); color:var(--gold);
        font-size:12px; font-weight:600; cursor:pointer; transition:all .3s var(--ease); }
    .login-btn:hover{ background:var(--gold); color:#0A0E10; box-shadow:0 8px 26px -8px rgba(240,198,116,.6); }
    .hud-links{ display:flex; gap:2px; }
    .hud-links a{ color:var(--txt-dim); text-decoration:none; font-size:12px; padding:8px 12px; border-radius:10px; transition:.25s; }
    .hud-links a:hover{ color:var(--txt); background:rgba(255,255,255,.06); }
    @media (max-width:880px){ .hud-links{ display:none; } }

    /* ================= BOTTOM CAPTURE CONSOLE ================= */
    .console{ position:absolute; left:50%; transform:translateX(-50%); z-index:20;
        bottom:calc(30px + env(safe-area-inset-bottom,0));
        display:flex; align-items:center; gap:18px; padding:14px 16px 14px 22px; border-radius:26px;
        max-width:calc(100vw - 36px); }
    .console .meta{ line-height:1.35; }
    .console .meta .k{ font-size:10px; letter-spacing:.24em; color:var(--gold); text-transform:uppercase; }
    .console .meta .d{ font-size:13px; color:var(--txt-dim); margin-top:3px; max-width:230px; }
    .capture{ position:relative; width:76px; height:76px; flex-shrink:0; }
    .capture .ring{ position:absolute; inset:-8px; border-radius:50%; border:1px dashed rgba(240,198,116,.5); animation:spin 14s linear infinite; }
    .capture .ring::before{ content:''; position:absolute; top:-4px; left:50%; width:6px; height:6px; margin-left:-3px; border-radius:50%; background:var(--cyan); box-shadow:0 0 10px var(--cyan); }
    @keyframes spin{ to{ transform:rotate(360deg);} }
    .capture button{ position:absolute; inset:0; border-radius:50%; border:none; cursor:pointer;
        background:radial-gradient(circle at 40% 30%, var(--gold), var(--gold-2));
        color:#0A0E10; font-size:26px; display:flex; align-items:center; justify-content:center;
        box-shadow:0 14px 34px -10px rgba(240,198,116,.7), 0 0 0 1px rgba(255,255,255,.2) inset;
        transition:transform .35s var(--ease); }
    .capture button:hover{ transform:scale(1.06); }
    .capture button:active{ transform:scale(.97); }
    .console .ai-open{ width:46px; height:46px; border-radius:50%; flex-shrink:0; cursor:pointer;
        display:flex; align-items:center; justify-content:center; color:var(--cyan); font-size:18px;
        border:1px solid var(--line); background:rgba(255,255,255,.04); transition:.3s; }
    .console .ai-open:hover{ border-color:var(--cyan); color:#fff; box-shadow:0 0 24px -6px var(--cyan); }
    @media (max-width:560px){ .console .meta{ display:none; } .console{ padding:12px; gap:12px; } }

    /* ================= ANALYSIS / RESULT PANEL ================= */
    .stage{ position:absolute; inset:0; z-index:30; display:flex; align-items:center; justify-content:center;
        padding:20px; opacity:0; pointer-events:none; transition:opacity .4s var(--ease);
        background:radial-gradient(60% 60% at 50% 45%, rgba(6,10,12,.55), rgba(6,10,12,.86)); }
    .stage.show{ opacity:1; pointer-events:auto; }
    .panel{ width:min(560px, 94vw); border-radius:28px; padding:26px; position:relative;
        transform:translateY(16px) scale(.98); transition:transform .5s var(--ease); }
    .stage.show .panel{ transform:none; }
    .panel-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:18px; }
    .panel-head .k{ font-size:10px; letter-spacing:.26em; color:var(--gold); text-transform:uppercase; }
    .panel-close{ width:34px; height:34px; border-radius:50%; border:1px solid var(--line); background:transparent; color:var(--txt-dim); cursor:pointer; transition:.25s; }
    .panel-close:hover{ color:#fff; border-color:var(--txt); }

    /* scan image */
    .scan{ position:relative; border-radius:18px; overflow:hidden; aspect-ratio:16/10; border:1px solid var(--line); background:#05080a; }
    .scan img{ width:100%; height:100%; object-fit:cover; }
    .scan .grid{ position:absolute; inset:0; background-image:linear-gradient(rgba(127,233,214,.12) 1px,transparent 1px),linear-gradient(90deg,rgba(127,233,214,.12) 1px,transparent 1px); background-size:26px 26px; mix-blend-mode:overlay; opacity:.5; }
    .scan .laser{ position:absolute; left:0; right:0; height:2px; top:0;
        background:linear-gradient(90deg, transparent, var(--cyan), transparent);
        box-shadow:0 0 18px 4px rgba(127,233,214,.5); }
    .scanning .laser{ animation:scanmove 1.6s var(--ease) infinite; }
    @keyframes scanmove{ 0%{ top:4%; opacity:0; } 15%{opacity:1;} 85%{opacity:1;} 100%{ top:96%; opacity:0; } }
    .scan .corner{ position:absolute; width:22px; height:22px; border:2px solid var(--gold); }
    .scan .corner.tl{ top:10px; left:10px; border-right:none; border-bottom:none; }
    .scan .corner.tr{ top:10px; right:10px; border-left:none; border-bottom:none; }
    .scan .corner.bl{ bottom:10px; left:10px; border-right:none; border-top:none; }
    .scan .corner.br{ bottom:10px; right:10px; border-left:none; border-top:none; }

    /* stepper */
    .steps{ display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-top:18px; }
    .step{ text-align:center; padding:12px 6px; border-radius:14px; border:1px solid var(--line-2);
        background:rgba(255,255,255,.02); transition:.4s var(--ease); }
    .step .ic{ width:30px; height:30px; margin:0 auto 8px; border-radius:50%; display:flex; align-items:center; justify-content:center;
        font-size:12px; color:var(--txt-dim); border:1px solid var(--line); transition:.4s; }
    .step .lb{ font-size:10px; color:var(--txt-dim); letter-spacing:.02em; }
    .step.active{ border-color:rgba(127,233,214,.5); background:rgba(127,233,214,.06); }
    .step.active .ic{ color:var(--cyan); border-color:var(--cyan); box-shadow:0 0 16px -2px var(--cyan); animation:pulse2 1.2s infinite; }
    @keyframes pulse2{ 50%{ opacity:.55; } }
    .step.done .ic{ color:#0A0E10; background:var(--gold); border-color:var(--gold); }
    .step.done .lb{ color:var(--txt); }
    .step.fail .ic{ color:#ff9a76; border-color:#ff9a76; }

    /* result */
    .result{ display:none; margin-top:20px; }
    .result.show{ display:block; animation:fadeUp .6s var(--ease); }
    @keyframes fadeUp{ from{ opacity:0; transform:translateY(14px);} to{ opacity:1; transform:none; } }
    .result .name{ font-size:34px; font-weight:500; line-height:1.05; letter-spacing:-.01em; }
    .result .sci{ font-size:13px; color:var(--cyan); font-style:italic; margin-top:6px; }
    .result .tags{ display:flex; flex-wrap:wrap; gap:8px; margin:16px 0; }
    .result .tag{ font-size:11px; padding:5px 12px; border-radius:999px; border:1px solid var(--line);
        background:rgba(255,255,255,.03); color:var(--txt-dim); }
    .result .tag.warn{ color:#ffb27a; border-color:rgba(255,150,90,.4); background:rgba(255,120,60,.08); }
    .result .intro{ font-size:13.5px; line-height:1.75; color:var(--txt-dim); max-height:170px; overflow-y:auto; padding-right:6px; }
    .result .intro strong{ color:var(--gold); }
    .result .intro::-webkit-scrollbar{ width:5px; } .result .intro::-webkit-scrollbar-thumb{ background:rgba(255,255,255,.16); border-radius:6px; }
    .result .pinned{ display:flex; align-items:center; gap:8px; margin-top:16px; font-size:12px; color:var(--cyan); }
    .result .acts{ display:flex; gap:10px; margin-top:18px; }
    .btn{ flex:1; height:46px; border-radius:14px; border:none; cursor:pointer; font-size:13px; font-weight:600; transition:.3s var(--ease); display:flex; align-items:center; justify-content:center; gap:8px; }
    .btn.gold{ background:linear-gradient(180deg,var(--gold),var(--gold-2)); color:#0A0E10; box-shadow:0 12px 30px -12px rgba(240,198,116,.6); }
    .btn.gold:hover{ transform:translateY(-2px); }
    .btn.ghost{ background:rgba(255,255,255,.04); border:1px solid var(--line); color:var(--txt); }
    .btn.ghost:hover{ border-color:var(--txt); }

    /* ================= CHAT PANEL ================= */
    .chat{ position:absolute; top:0; right:0; height:100%; width:400px; max-width:100vw; z-index:40;
        display:flex; flex-direction:column; transform:translateX(105%); transition:transform .45s var(--ease);
        padding-top:calc(74px + env(safe-area-inset-top,0)); border-left:1px solid var(--line); }
    .chat.open{ transform:none; }
    .chat-head{ display:flex; align-items:center; justify-content:space-between; padding:16px 20px; border-bottom:1px solid var(--line); }
    .chat-head .l{ display:flex; align-items:center; gap:10px; }
    .chat-head .l .o{ width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:var(--cyan); background:rgba(127,233,214,.1); }
    .chat-head b{ font-size:14px; font-weight:600; }
    .chat-head .x{ background:none; border:none; color:var(--txt-dim); font-size:18px; cursor:pointer; }
    .chat-body{ flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:14px; }
    .chat-body::-webkit-scrollbar{ width:5px; } .chat-body::-webkit-scrollbar-thumb{ background:rgba(255,255,255,.16); border-radius:6px; }
    .msg{ max-width:86%; padding:12px 15px; border-radius:16px; font-size:14px; line-height:1.6; animation:fadeUp .3s var(--ease); word-wrap:break-word; }
    .msg.ai{ align-self:flex-start; background:rgba(255,255,255,.05); border:1px solid var(--line); border-top-left-radius:4px; }
    .msg.user{ align-self:flex-end; background:linear-gradient(180deg,var(--gold),var(--gold-2)); color:#0A0E10; border-top-right-radius:4px; }
    .msg .markdown-body p{ margin:0 0 6px; } .msg .markdown-body p:last-child{ margin:0; }
    .msg .markdown-body strong{ color:var(--gold); } .msg.user .markdown-body strong{ color:#0A0E10; }
    .msg .markdown-body ul,.msg .markdown-body ol{ margin:6px 0; padding-left:18px; }
    .msg-image{ width:100%; border-radius:10px; margin-top:8px; max-height:180px; object-fit:cover; }
    .typing{ align-self:flex-start; display:flex; gap:5px; padding:14px 16px; border-radius:16px; background:rgba(255,255,255,.05); border:1px solid var(--line); }
    .typing span{ width:6px; height:6px; border-radius:50%; background:var(--cyan); animation:bd 1.4s infinite ease-in-out both; }
    .typing span:nth-child(1){ animation-delay:-.32s; } .typing span:nth-child(2){ animation-delay:-.16s; }
    @keyframes bd{ 0%,80%,100%{ transform:scale(0);} 40%{ transform:scale(1);} }
    .chat-ctrl{ padding:14px 16px; border-top:1px solid var(--line); }
    .qp{ display:flex; gap:8px; overflow-x:auto; margin-bottom:10px; scrollbar-width:none; } .qp::-webkit-scrollbar{ display:none; }
    .qp button{ white-space:nowrap; flex-shrink:0; font-size:12px; padding:6px 13px; border-radius:999px; cursor:pointer;
        background:rgba(255,255,255,.04); border:1px solid var(--line); color:var(--txt-dim); transition:.25s; }
    .qp button:hover{ color:var(--gold); border-color:var(--gold); }
    .inbar{ display:flex; align-items:center; gap:10px; background:rgba(255,255,255,.05); border:1px solid var(--line); border-radius:20px; padding:6px; }
    .inbar input{ flex:1; background:transparent; border:none; outline:none; color:var(--txt); font-size:14px; padding:0 6px; min-width:0; }
    .inbar input::placeholder{ color:rgba(234,241,238,.4); }
    .inbar .cam,.inbar .snd{ width:38px; height:38px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center; cursor:pointer; position:relative; }
    .inbar .cam{ background:linear-gradient(180deg,var(--gold),var(--gold-2)); color:#0A0E10; border:none; }
    .inbar .cam input{ position:absolute; inset:0; opacity:0; cursor:pointer; }
    .inbar .snd{ background:transparent; border:none; color:var(--cyan); }
    .inbar .snd:hover{ background:rgba(127,233,214,.12); }

    /* ================= AUTH MODAL ================= */
    .modal{ position:fixed; inset:0; z-index:60; display:none; align-items:center; justify-content:center; padding:20px;
        background:rgba(4,7,9,.72); backdrop-filter:blur(8px); }
    .modal.show{ display:flex; }
    .auth{ width:min(400px,94vw); border-radius:24px; padding:30px; position:relative; }
    .auth h2{ font-size:24px; font-weight:500; }
    .auth .sub{ font-size:13px; color:var(--txt-dim); margin-top:6px; }
    .auth .tabs{ display:flex; gap:20px; margin:22px 0 16px; font-size:14px; font-weight:600; border-bottom:1px solid var(--line); }
    .auth .tabs button{ background:none; border:none; color:var(--txt-dim); cursor:pointer; padding-bottom:12px; margin-bottom:-1px; }
    .auth .tabs button.on{ color:var(--gold); border-bottom:2px solid var(--gold); }
    .auth label{ font-size:10px; letter-spacing:.14em; text-transform:uppercase; color:var(--txt-dim); }
    .auth input{ width:100%; margin:6px 0 14px; background:rgba(255,255,255,.05); border:1px solid var(--line); border-radius:12px; padding:12px 14px; color:var(--txt); font-size:14px; outline:none; transition:border-color .25s; }
    .auth input:focus{ border-color:var(--gold); }
    .auth .go{ width:100%; height:48px; border-radius:14px; border:none; cursor:pointer; font-size:14px; font-weight:600;
        background:linear-gradient(180deg,var(--gold),var(--gold-2)); color:#0A0E10; box-shadow:0 14px 34px -12px rgba(240,198,116,.6); }
    .auth .msg-err{ font-size:12px; color:#ff9a76; margin-bottom:10px; min-height:16px; }
    .auth .x{ position:absolute; top:16px; right:16px; background:none; border:none; color:var(--txt-dim); font-size:20px; cursor:pointer; }

    /* toast */
    .toast{ position:fixed; left:50%; bottom:120px; transform:translateX(-50%) translateY(20px); z-index:80;
        padding:12px 20px; border-radius:14px; font-size:13px; opacity:0; pointer-events:none; transition:.4s var(--ease); }
    .toast.show{ opacity:1; transform:translateX(-50%); }

    /* fullscreen preview */
    .fs{ position:fixed; inset:0; z-index:90; background:rgba(0,0,0,.92); display:flex; align-items:center; justify-content:center; opacity:0; transition:opacity .3s; cursor:zoom-out; }
    .fs.show{ opacity:1; }
    .fs img{ max-width:92%; max-height:92%; border-radius:12px; box-shadow:0 20px 60px rgba(0,0,0,.6); }

    /* map marker */
    .custom-marker{ background:rgba(12,16,18,.9); backdrop-filter:blur(6px); border:1.5px solid var(--gold); color:var(--gold);
        padding:6px 10px; border-radius:14px; font-size:13px; box-shadow:0 8px 24px rgba(0,0,0,.5); white-space:nowrap; text-align:center; }
    .custom-marker::after{ content:''; position:absolute; bottom:-8px; left:50%; transform:translateX(-50%);
        border-width:8px 6px 0; border-style:solid; border-color:var(--gold) transparent transparent transparent; }
    </style>
</head>
<body>

<div id="map"></div>
<div id="scrim"></div>
<canvas id="particles"></canvas>

<!-- ================= TOP HUD ================= -->
<div class="hud">
    <a href="index.html" class="brand">
        <img src="/logo.png" alt="Logo">
        <span class="t"><b>WingGuard</b><small>AI Vision · 智能识鸟</small></span>
    </a>
    <div class="hud-links">
        <a href="index.html">首页</a>
        <a href="birds.html">鸟类图鉴</a>
        <a href="story.html">迁徙故事</a>
        <a href="protect.html">保护行动</a>
    </div>
    <div class="hud-right">
        <div class="chip glass" id="locChip"><span class="status-dot"></span><span id="locText">定位中…</span></div>
        <div class="user-pill glass" id="userPill" style="display:none" onclick="scrollToProfile()">
            <span class="av" id="userAv">你</span>
            <span id="userName">守护者</span>
            <span class="pts" id="userPts">0 pt</span>
        </div>
        <button class="login-btn" id="loginBtn" onclick="openAuth()">登录 / 注册</button>
    </div>
</div>

<!-- ================= BOTTOM CAPTURE CONSOLE ================= -->
<div class="console glass">
    <div class="capture">
        <div class="ring"></div>
        <button id="captureBtn" title="拍摄 / 相册"><i class="fa-solid fa-camera"></i></button>
        <input type="file" id="fileInput" accept="image/*" capture="environment" style="display:none">
    </div>
    <div class="meta">
        <div class="k">Identify &amp; Pin</div>
        <div class="d">拍摄或选择鸟类照片，AI 自动识别并标记到社区地图</div>
    </div>
    <div class="ai-open" id="chatOpenBtn" title="呼唤 WingGuard AI 对话"><i class="fa-solid fa-comment-dots"></i></div>
</div>

<script type="module">
import { DataAdapter } from '/src/DataAdapter.js';

/* ================= PARTICLE NETWORK ================= */
(function particles(){
    const cv = document.getElementById('particles'); const ctx = cv.getContext('2d');
    let w, h, dpr, pts = [];
    const N = () => Math.min(72, Math.floor(window.innerWidth/22));
    function resize(){
        dpr = Math.min(window.devicePixelRatio||1, 2);
        w = cv.width = innerWidth*dpr; h = cv.height = innerHeight*dpr;
        cv.style.width = innerWidth+'px'; cv.style.height = innerHeight+'px';
        pts = Array.from({length:N()}, () => ({
            x:Math.random()*w, y:Math.random()*h,
            vx:(Math.random()-.5)*0.18*dpr, vy:(Math.random()-.5)*0.18*dpr,
            r:(Math.random()*1.6+0.6)*dpr
        }));
    }
    window.__particleBoost = 0;
    function tick(){
        ctx.clearRect(0,0,w,h);
        const boost = window.__particleBoost;
        const linkDist = (120 + boost*40)*dpr;
        for(const p of pts){
            p.x+=p.vx*(1+boost); p.y+=p.vy*(1+boost);
            if(p.x<0||p.x>w) p.vx*=-1; if(p.y<0||p.y>h) p.vy*=-1;
        }
        for(let i=0;i<pts.length;i++){
            const a=pts[i];
            ctx.beginPath(); ctx.arc(a.x,a.y,a.r,0,7);
            ctx.fillStyle = boost? 'rgba(127,233,214,0.7)' : 'rgba(240,198,116,0.55)'; ctx.fill();
            for(let j=i+1;j<pts.length;j++){
                const b=pts[j]; const dx=a.x-b.x, dy=a.y-b.y; const d=Math.hypot(dx,dy);
                if(d<linkDist){
                    ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y);
                    const al=(1-d/linkDist)*(boost?0.28:0.14);
                    ctx.strokeStyle = boost? `rgba(127,233,214,${al})` : `rgba(240,198,116,${al})`;
                    ctx.lineWidth = dpr*0.6; ctx.stroke();
                }
            }
        }
        requestAnimationFrame(tick);
    }
    resize(); window.addEventListener('resize', resize); tick();
})();

/* ================= MAP (dark tech style) ================= */
let map, geolocation, currentLocation=null, lastPinPos=null;
map = new AMap.Map('map', { zoom:14, center:[114.05956,22.54286], mapStyle:'amap://styles/dark', showLabel:true });
map.on('click', ()=>closeChat());
map.plugin('AMap.Geolocation', function(){
    geolocation = new AMap.Geolocation({ enableHighAccuracy:true, timeout:10000, showMarker:true, panToLocation:true, zoomToAccuracy:true, buttonPosition:'LB', buttonOffset:new AMap.Pixel(15,90) });
    map.addControl(geolocation);
    geolocation.getCurrentPosition((status,result)=>{
        if(status==='complete'){ currentLocation=result.position; setLoc('已定位 · '+ (result.formattedAddress? result.formattedAddress.slice(0,10) : '深圳湾')); }
        else { setLoc('定位失败 · 使用默认'); }
    });
});
function setLoc(t){ document.getElementById('locText').textContent = t; }

/* ================= AUTH / USER ================= */
let currentUser=null, authMode='in';
async function refreshUser(){
    try{ currentUser = await DataAdapter.getCurrentUser(); }catch(e){ currentUser=null; }
    const pill=document.getElementById('userPill'), btn=document.getElementById('loginBtn');
    if(currentUser){
        pill.style.display='inline-flex'; btn.style.display='none';
        document.getElementById('userName').textContent = currentUser.nickname || '守护者';
        document.getElementById('userAv').textContent = (currentUser.nickname||'守')[0];
        document.getElementById('userPts').textContent = (currentUser.points||0)+' pt';
    } else { pill.style.display='none'; btn.style.display='inline-block'; }
}
window.openAuth=()=>document.getElementById('authModal').classList.add('show');
window.closeAuth=()=>document.getElementById('authModal').classList.remove('show');
window.switchTab=(m)=>{ authMode=m;
    document.getElementById('tabIn').classList.toggle('on', m==='in');
    document.getElementById('tabUp').classList.toggle('on', m==='up');
    document.getElementById('upName').style.display = m==='up'?'block':'none';
    document.getElementById('authGo').textContent = m==='up'?'注册并登录':'登录';
    document.getElementById('authErr').textContent='';
};
window.submitAuth=async()=>{
    const email=document.getElementById('authEmail').value.trim();
    const pwd=document.getElementById('authPwd').value;
    const nick=document.getElementById('authNick').value.trim();
    const err=document.getElementById('authErr');
    if(!email||pwd.length<6){ err.textContent='请填写邮箱与至少 6 位密码'; return; }
    const go=document.getElementById('authGo'); go.disabled=true; const old=go.textContent; go.textContent='处理中…';
    try{
        if(authMode==='up'){
            await DataAdapter.signUp(email, pwd, 'public', { nickname: nick||'守护者' });
            try{ await DataAdapter.signIn(email, pwd); }catch(_){}
        } else {
            await DataAdapter.signIn(email, pwd);
        }
        await refreshUser();
        if(currentUser){ closeAuth(); toast('欢迎回来，'+(currentUser.nickname||'守护者')); }
        else { err.textContent='注册成功，请查收邮件确认后再登录'; }
    }catch(e){ err.textContent = e.message || '认证失败，请重试'; }
    finally{ go.disabled=false; go.textContent=old; }
};
window.scrollToProfile=()=>{ location.href='index.html#action'; };

/* ================= TOAST ================= */
let toastTimer;
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('show'),2600); }

/* ================= STORAGE UPLOAD (Nextcloud WebDAV) ================= */
async function uploadToStorage(file){
    const filename = `wingguard_${Date.now()}_${(file.name||'photo.jpg').replace(/[^\w.\-]/g,'_')}`;
    const url = `http://13.55.143.55:40069/remote.php/webdav/Photos/${filename}`;
    try{
        const res = await fetch(url, { method:'PUT', headers:{ 'Authorization':'Basic '+btoa('usdoubao:yuchengdong') }, body:file });
        return res.ok ? url : null;
    }catch(e){ return null; }
}

/* ================= AI CALL (Agnes vision) ================= */
let chatHistory=[];
async function askAgnes(messages){
    const res = await fetch('https://apihub.agnes-ai.com/v1/chat/completions',{
        method:'POST',
        headers:{ 'Content-Type':'application/json', 'Authorization':'Bearer wk-RpfvyhbDfh8Akj2XjWXNZLGRi61lUqnY3mi1mrzT3o0m3cOn' },
        body:JSON.stringify({ model:'agnes-2.0-flash', messages })
    });
    if(!res.ok) throw new Error('HTTP '+res.status);
    const data = await res.json();
    return data.choices[0].message.content;
}

/* ================= LOCATION (robust) ================= */
function getLocation(){
    return new Promise((resolve)=>{
        if(!geolocation){ resolve(currentLocation || [114.05956,22.54286]); return; }
        const to=setTimeout(()=>resolve(currentLocation || [114.05956,22.54286]), 10000);
        geolocation.getCurrentPosition((status,result)=>{ clearTimeout(to);
            if(status==='complete'){ currentLocation=result.position; resolve(result.position); }
            else resolve(currentLocation || [114.05956,22.54286]);
        });
    });
}

/* ================= IDENTIFY PIPELINE ================= */
const stage=document.getElementById('stage');
function setStep(name, state){ const el=document.querySelector(`.step[data-step="${name}"]`); if(!el) return; el.classList.remove('active','done','fail'); if(state) el.classList.add(state);
    if(state==='done'){ const ic=el.querySelector('.ic'); ic.innerHTML='<i class="fa-solid fa-check"></i>'; } }
function resetSteps(){ ['upload','geo','ai','pin'].forEach(s=>{ const el=document.querySelector(`.step[data-step="${s}"]`); el.className='step';
    const map={upload:'cloud-arrow-up',geo:'location-crosshairs',ai:'brain',pin:'map-pin'}; el.querySelector('.ic').innerHTML=`<i class="fa-solid fa-${map[s]}"></i>`; }); }

window.closeStage=()=>{ stage.classList.remove('show'); window.__particleBoost=0; };

async function runIdentify(file){
    if(!currentUser){ openAuth(); toast('请先登录后再拍摄识别'); return; }

    const base64 = await new Promise(r=>{ const fr=new FileReader(); fr.onload=e=>r(e.target.result); fr.readAsDataURL(file); });

    // open stage
    resetSteps();
    document.getElementById('result').classList.remove('show');
    document.getElementById('scan').classList.add('scanning');
    document.getElementById('scanImg').src = base64;
    document.getElementById('panelKicker').textContent = 'Analyzing · 光学识别中';
    stage.classList.add('show');
    window.__particleBoost = 1;

    // 1) upload to storage (parallel start)
    setStep('upload','active');
    const uploadPromise = uploadToStorage(file);

    // 2) geolocation
    setStep('geo','active');
    const [uploadedUrl, loc] = await Promise.all([ uploadPromise, getLocation() ]);
    setStep('upload', uploadedUrl ? 'done' : 'fail');
    setStep('geo', loc ? 'done' : 'fail');

    // 3) AI identify
    setStep('ai','active');
    let aiText;
    try{
        const messages = [{ role:'user', content:[
            { type:'text', text:'请识别这张图片中的鸟类。用中文回答：第一行只给出鸟的中文名称；随后用 2-3 句简介其外形、习性与在东亚—澳大利西亚迁飞路线上的意义；若属于保护物种请注明保护等级。' },
            { type:'image_url', image_url:{ url:base64 } }
        ]}];
        aiText = await askAgnes(messages);
        chatHistory = messages.concat([{ role:'assistant', content:aiText }]);
        setStep('ai','done');
    }catch(e){ setStep('ai','fail'); document.getElementById('scan').classList.remove('scanning');
        toast('AI 识别失败：'+e.message); return; }

    document.getElementById('scan').classList.remove('scanning');

    // 4) pin on community map
    setStep('pin','active');
    const name = extractName(aiText);
    const photoUrl = uploadedUrl || base64;
    let pinned=false;
    try{ await dropPin(loc, name, aiText, photoUrl); pinned=true; setStep('pin','done'); }
    catch(e){ setStep('pin','fail'); }

    // show result
    renderResult(name, aiText, pinned);
    document.getElementById('panelKicker').textContent = 'Identified · 识别完成';
    window.__particleBoost = 0;
    refreshUser();
}

function extractName(text){
    const first = (text.split('\n').find(l=>l.trim()) || '').trim();
    const m = first.match(/(?:是|称为|叫|名为|这是|图片中是)\s*([^，。！,!.:：]{2,12})/);
    let n = m && m[1] ? m[1].trim() : (first.length<=14 ? first.replace(/[#*：:。.\s]/g,'') : '未知鸟种');
    return n || '未知鸟种';
}

function renderResult(name, aiText, pinned){
    document.getElementById('resName').textContent = name;
    document.getElementById('resSci').textContent = 'AI VISION · agnes-2.0';
    // tags: detect protection keywords
    const tags = document.getElementById('resTags'); tags.innerHTML='';
    const add=(t,warn)=>{ const s=document.createElement('span'); s.className='tag'+(warn?' warn':''); s.textContent=t; tags.appendChild(s); };
    add('AI 识别');
    if(/国家一级|一级保护/.test(aiText)) add('国家一级保护', true);
    else if(/国家二级|二级保护/.test(aiText)) add('国家二级保护', true);
    else if(/濒危|易危|近危|保护/.test(aiText)) add('受关注物种', true);
    add('候鸟');
    // intro = text minus first line
    const rest = aiText.split('\n').slice(1).join('\n').trim() || aiText;
    document.getElementById('resIntro').innerHTML = marked.parse(rest);
    document.getElementById('resPinned').style.display = pinned ? 'flex' : 'none';
    document.getElementById('result').classList.add('show');
}

/* ================= DROP PIN + PERSIST ================= */
async function dropPin(position, name, description, photoUrl){
    const who = currentUser ? (currentUser.nickname||'守护者') : '热心观测员';
    const content = `
      <div class="custom-marker">
        <div style="font-size:9px;color:rgba(255,255,255,.6);margin-bottom:2px;"><i class="fa-solid fa-user" style="font-size:8px"></i> ${who} 记录</div>
        <div style="font-weight:700;color:var(--gold)">${name}</div>
        ${photoUrl?`<img src="${photoUrl}" style="width:100%;height:42px;object-fit:cover;border-radius:6px;margin-top:5px;cursor:pointer" onclick="showFullScreenPreview('${photoUrl}')">`:''}
      </div>`;
    const marker = new AMap.Marker({ position, content, offset:new AMap.Pixel(-50,-56) });
    map.add(marker); map.panTo(position); lastPinPos=position;

    await DataAdapter.submitObservation({
        speciesId:'unknown', commonName:name, scientificName:name+' (AI识别)',
        decimalLongitude: position.lng || (Array.isArray(position)?position[0]:114.05956),
        decimalLatitude:  position.lat || (Array.isArray(position)?position[1]:22.54286),
        individualCount:1, note:'通过 WingGuard AI 自动识别并打点', photoUrl:photoUrl||''
    });
}
window.viewPin=()=>{ closeStage(); if(lastPinPos) map.panTo(lastPinPos); };

/* ================= CHAT (follow-up Q&A) ================= */
const chatArea=document.getElementById('chatArea'), textInput=document.getElementById('textInput');
let chatBase64=null;
window.setPrompt=(t)=>{ textInput.value=t; textInput.focus(); };
window.openChatWithContext=()=>{ closeStage(); openChat(); };
window.openChat=()=>document.getElementById('chat').classList.add('open');
window.closeChat=()=>document.getElementById('chat').classList.remove('open');
document.getElementById('chatOpenBtn').onclick=window.openChat;

function addMsg(sender, text, img){
    const d=document.createElement('div'); d.className='msg '+sender;
    if(text){ const s=document.createElement('div'); s.className='markdown-body'; s.innerHTML = sender==='ai'? marked.parse(text) : escapeHtml(text); d.appendChild(s); }
    if(img){ const im=document.createElement('img'); im.src=img; im.className='msg-image'; d.appendChild(im); }
    chatArea.appendChild(d); chatArea.scrollTop=chatArea.scrollHeight; return d;
}
function escapeHtml(s){ const p=document.createElement('div'); p.textContent=s; return p.innerHTML; }
function typing(on){ let t=document.getElementById('typing'); if(on){ if(!t){ t=document.createElement('div'); t.className='typing'; t.id='typing'; t.innerHTML='<span></span><span></span><span></span>'; chatArea.appendChild(t); chatArea.scrollTop=chatArea.scrollHeight; } } else if(t) t.remove(); }

window.sendMessage=async()=>{
    const text=textInput.value.trim();
    if(!text && !chatBase64) return;
    addMsg('user', text||'请识别这张图片', chatBase64);
    textInput.value=''; typing(true);
    const content=[{ type:'text', text: text||'请识别这张图片' }];
    if(chatBase64) content.push({ type:'image_url', image_url:{ url:chatBase64 } });
    chatHistory.push({ role:'user', content });
    try{
        const reply = await askAgnes(chatHistory);
        chatHistory.push({ role:'assistant', content:reply });
        typing(false); addMsg('ai', reply);
        // if it was an image in chat, also pin it
        if(chatBase64 && currentUser){ const loc=await getLocation(); const up=await uploadToStorage(dataURLtoFile(chatBase64)); try{ await dropPin(loc, extractName(reply), reply, up||chatBase64);}catch(_){} }
        chatBase64=null;
    }catch(e){ typing(false); addMsg('ai','抱歉，无法连接到 AI 服务。('+e.message+')'); chatBase64=null; }
};
function dataURLtoFile(dataurl){ const arr=dataurl.split(','), mime=arr[0].match(/:(.*?);/)[1], bstr=atob(arr[1]); let n=bstr.length; const u8=new Uint8Array(n); while(n--) u8[n]=bstr.charCodeAt(n); return new File([u8], 'chat.jpg', {type:mime}); }
document.getElementById('chatFileInput').addEventListener('change', async e=>{ const f=e.target.files[0]; if(!f) return; chatBase64=await new Promise(r=>{ const fr=new FileReader(); fr.onload=ev=>r(ev.target.result); fr.readAsDataURL(f); }); addMsg('user','（已附带图片，正在发送…）', chatBase64); e.target.value=''; sendMessage(); });

/* ================= FULLSCREEN PREVIEW ================= */
window.showFullScreenPreview=(url)=>{ let p=document.getElementById('fs'); if(!p){ p=document.createElement('div'); p.id='fs'; p.className='fs'; p.innerHTML=`<img src="${url}">`; p.onclick=()=>{ p.classList.remove('show'); setTimeout(()=>p.remove(),300); }; document.body.appendChild(p);} else document.querySelector('#fs img').src=url; void p.offsetWidth; p.classList.add('show'); };

/* ================= WIRE CAPTURE (login-gated) ================= */
const fileInput=document.getElementById('fileInput');
document.getElementById('captureBtn').onclick=()=>{ if(!currentUser){ openAuth(); toast('请先登录后再拍摄识别'); return; } fileInput.click(); };
fileInput.addEventListener('change', e=>{ const f=e.target.files[0]; if(f) runIdentify(f); e.target.value=''; });

/* ================= INIT ================= */
refreshUser();
</script>
